name: Content Quality Audit
description: Audits content for quality and consistency
mode: autonomous
default_profile: anthropic-sonnet-4-6
steps:
  - id: check_external
    name: Check External References
    agent: agents/external-checker.md
    tools:
      - fetch_url
      - write_file
    writes_to:
      - artifacts/external-check.md
    completion_check:
      files_exist:
        - artifacts/external-check.md
  - id: gather_content
    name: Gather Content Inventory
    agent: agents/content-gatherer.md
    tools:
      - read_file
      - list_files
      - write_file
    writes_to:
      - artifacts/content-inventory.json
    completion_check:
      files_exist:
        - artifacts/content-inventory.json
  - id: analyse_quality
    name: Analyse Quality
    agent: agents/quality-analyser.md
    tools:
      - read_file
      - write_file
    reads_from:
      - artifacts/content-inventory.json
      - artifacts/external-check.md
    writes_to:
      - artifacts/quality-report.md
    completion_check:
      files_exist:
        - artifacts/quality-report.md
