# yaml-language-server: $schema=../../workflow-schema.json
name: Content Quality Audit
description: Scans, analyses, and reports on content quality
mode: interactive
# Change this to match your configured Umbraco.AI profile alias
default_profile: anthropic-sonnet-4-6
# Story 9.6: workflow-configurable tool tuning. Marketing pages routinely
# exceed the 1 MB engine default in size only marginally — but live testing
# on 2026-04-07 found that some homepages need ~2 MB headroom. Bump to 2 MB
# and extend the per-request fetch_url timeout to 30s to absorb slow CDNs.
tool_defaults:
  fetch_url:
    max_response_bytes: 2097152
    timeout_seconds: 30
steps:
  - id: scanner
    name: Content Scanner
    agent: agents/scanner.md
    tools:
      - fetch_url
      - read_file
      - write_file
    writes_to:
      - artifacts/scan-results.md
    completion_check:
      files_exist:
        - artifacts/scan-results.md
  - id: analyser
    name: Quality Analyser
    agent: agents/analyser.md
    tools:
      - read_file
      - write_file
    reads_from:
      - artifacts/scan-results.md
    writes_to:
      - artifacts/quality-scores.md
    completion_check:
      files_exist:
        - artifacts/quality-scores.md
  - id: reporter
    name: Report Generator
    agent: agents/reporter.md
    tools:
      - read_file
      - write_file
    reads_from:
      - artifacts/quality-scores.md
    writes_to:
      - artifacts/audit-report.md
    completion_check:
      files_exist:
        - artifacts/audit-report.md
