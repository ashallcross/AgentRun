# yaml-language-server: $schema=../../Schemas/workflow-schema.json
name: Umbraco Content Audit
description: Audits content in this Umbraco instance for quality, completeness, and structural issues
mode: interactive

# ─── Optional: Brand pillar ───
# Set brand_voice_context to an Umbraco.AI Context alias (Settings > AI > Contexts)
# to enable a 7th audit pillar — Brand — which scores content alignment against
# your site's brand voice. Leave as "" to run the v1 6-pillar audit unchanged.
# When set, the scanner pre-validates the alias before starting the audit and
# halts with a structured error if the alias does not resolve.
#
# content_audit_body_max_chars caps the body_text field on each get_content
# response (block-list / RTE / body-copy prose is extracted in C# before the
# response envelope is returned, stripped of HTML, and capped at this many
# chars with a literal "[...truncated at N of M chars]" marker appended when
# the full prose exceeds the cap). Default 15000 covers ~95% of editorial
# content fully. Lower for large-site audits (200+ nodes) where prompt budget
# matters; raise for sites with long-form pillar pages. Non-integer / zero /
# negative values fall back to the 15000 default + a per-step Warning log.
# Body metadata (headings / links / alt_texts / image_count) is always fully
# extracted — this cap does NOT apply to structural audits.
config:
  brand_voice_context: ""
  content_audit_body_max_chars: "15000"

# ─── Optional: per-step profile routing ───
# Route cheap/mechanical steps (scanner, analyser) to a fast model and the
# reporter to a flagship model — paying for quality only where it shows.
# Replace the aliases with your own Umbraco.AI profile aliases
# (Settings > AI). An alias referenced here but not configured in Umbraco.AI
# will fail at step execution with ProfileNotFoundException.
#
# To enable: uncomment the `default_profile:` line below AND add a
# `profile: your-quality-profile` line to the existing `reporter` step
# further down in this file (do NOT uncomment a second `steps:` block).
#
# default_profile: your-fast-profile            # e.g. Sonnet — used by scanner + analyser

steps:
  - id: scanner
    name: Content Scanner
    agent: agents/scanner.md
    tools:
      - list_content
      - list_content_types
      - get_content
      - write_file
      - get_ai_context
      - search_content
    writes_to:
      - artifacts/content-inventory.md
      - artifacts/scan-results.md
    completion_check:
      files_exist:
        - artifacts/content-inventory.md
        - artifacts/scan-results.md
  - id: analyser
    name: Quality Analyser
    agent: agents/analyser.md
    tools:
      - read_file
      - write_file
      - get_ai_context
    reads_from:
      - artifacts/scan-results.md
    writes_to:
      - artifacts/quality-scores.md
    completion_check:
      files_exist:
        - artifacts/quality-scores.md
  - id: reporter
    name: Report Generator
    agent: agents/reporter.md
    tools:
      - read_file
      - write_file
    reads_from:
      - artifacts/scan-results.md
      - artifacts/quality-scores.md
    writes_to:
      - artifacts/audit-report.md
    completion_check:
      files_exist:
        - artifacts/audit-report.md
