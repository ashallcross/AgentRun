# yaml-language-server: $schema=../../../../../AgentRun.Umbraco/Schemas/workflow-schema.json
name: Content Tools Test
description: Manual E2E test workflow for Story 9.12 — exercises list_content, get_content, list_content_types, and write_file
mode: interactive
default_profile: anthropic-sonnet-4-6
steps:
  - id: tester
    name: Content Tools Tester
    agent: agents/tester.md
    tools:
      - list_content
      - get_content
      - list_content_types
      - write_file
    writes_to:
      - artifacts/test-results.md
    completion_check:
      files_exist:
        - artifacts/test-results.md
